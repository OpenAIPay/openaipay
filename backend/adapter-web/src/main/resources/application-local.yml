spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:${OPENAIPAY_RDS_LOCAL_PORT:13306}/openaipay?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&connectTimeout=3000&socketTimeout=15000&tcpKeepAlive=true&cachePrepStmts=true&prepStmtCacheSize=256&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true&useLocalSessionState=true&useLocalTransactionState=true&elideSetAutoCommits=true&maintainTimeStats=false&rewriteBatchedStatements=true
    username: ${OPENAIPAY_DB_USERNAME:openaipay}
    password: ${OPENAIPAY_DB_PASSWORD:openaipay}

aipay:
  short-video:
    cdn-base-url: ${OPENAIPAY_VIDEO_CDN_BASE_URL:}
    default-playback-protocol: ${OPENAIPAY_VIDEO_DEFAULT_PROTOCOL:MP4}
    default-playback-mime-type: ${OPENAIPAY_VIDEO_DEFAULT_MIME_TYPE:video/mp4}
